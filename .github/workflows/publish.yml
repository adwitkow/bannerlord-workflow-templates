name: Publish

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
    branches:
      - 'release/**'

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          
      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.workflow_run.head_branch }}"
          VERSION=v${VERSION#release/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Download build artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ github.event.workflow_run.id }} \
            --name Build \
            --dir ./artifact

      - name: Create archive
        run: |
          cd artifact
          zip -r "${{ github.event.repository.name }}.${{ steps.version.outputs.version }}.zip" .
          
      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')

          echo "## Changes" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md

          if [ -z "$PREV_TAG" ]; then
            git log --no-merges --oneline --no-decorate --pretty=format:"- %s - %an (%h)" >> RELEASE_NOTES.md
          else
            git log ${PREV_TAG}..HEAD \
              --no-merges --oneline --no-decorate --pretty=format:"- %s - %an (%h)" >> RELEASE_NOTES.md
          fi

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            ./artifact/${{ github.event.repository.name }}.${{ steps.version.outputs.version }}.zip \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
