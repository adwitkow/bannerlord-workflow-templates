name: Build

on:
  workflow_call:

env:
  # Disable the .NET logo in the console output.
  DOTNET_NOLOGO: true
  # Disable the .NET first time experience to skip caching NuGet packages and speed up the build.
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  # Disable sending .NET CLI telemetry to Microsoft.
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Get repo name
      id: get-repo-name
      run: echo "REPO_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV

    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Setup .NET Core
      uses: actions/setup-dotnet@master
      with:
        dotnet-version: 6.0.x

    - name: Update version in common.props
      shell: pwsh
      run: |
        $branch = $env:GITHUB_REF.replace('refs/heads/', '')
        if ($branch -match 'release\/(\d\.?){3,4}') {
          $version = $branch.Split('/')[-1]
          $path = 'build/common.props'
          $xml = New-Object XML
          $xml.Load($path)
          $versionElement =  $xml.SelectSingleNode("//Version")
          $versionElement.InnerText = $version
          $xml.Save($path)
          Write-Output "Modified common.props to build with version ${version}"
        } else {
          Write-Output 'No need to modify common.props version - this is not a release'
        }
        
    - name: Build Module
      shell: pwsh
      run: |
        $root = $PWD.Path
        $impl = Join-Path $root "bannerlord-implementations"
        $path = Join-Path $root "bannerlord"
    
        # Find the first .csproj dynamically instead of depending on REPO_NAME
        $csproj = Get-ChildItem -Path $root -Recurse -Filter *.csproj |
          Where-Object { $_.FullName -notmatch '\\(bin|obj)\\' } |
          Select-Object -First 1
    
        if (-not $csproj) {
          throw "No .csproj file found"
        }
    
        $moduleName = $csproj.BaseName
        $proj = $csproj.FullName
    
        $buildOutput = Join-Path $path "Modules/$moduleName/bin/Win64_Shipping_Client"
        $final = $buildOutput
    
        # The folders are required to be created before executing the script
        New-Item -ItemType Directory -Force -Path $impl | Out-Null
        New-Item -ItemType Directory -Force -Path $path | Out-Null
        New-Item -ItemType Directory -Force -Path $final | Out-Null
    
        [string[]]$gameversions = Get-Content -Path "supported-game-versions.txt"
    
        # Process all implementations
        foreach ($gameversion in $gameversions)
        {
            $constgameversion = $gameversion.Replace(".", "")
    
            echo "::group::Build for $gameversion"
            echo "Start building for gameversion = $gameversion"
    
            dotnet clean $proj --configuration Release
    
            dotnet build $proj `
              --configuration Release `
              -p:OverrideGameVersion=$gameversion `
              -p:GameFolder="$path" `
              -p:ConstGameVersionWithPrefix="$constgameversion"
    
            # Copy build artifacts dynamically
            Get-ChildItem -Path $buildOutput -Filter "*.dll" | Copy-Item -Destination $impl -Force
            Get-ChildItem -Path $buildOutput -Filter "*.pdb" | Copy-Item -Destination $impl -Force
    
            echo "::endgroup::"
        }
    
        # Copy implementations to the module
        Copy-Item "$impl/*" $final -Force
    
        # Delete implementations folder
        Remove-Item -Recurse -Force $impl
        
    - name: Upload build
      uses: actions/upload-artifact@v7
      with:
        name: Build
        path: ./bannerlord/
